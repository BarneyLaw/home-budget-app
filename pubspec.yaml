name: home_budget_app
description: Phone-first local budgeting assistant focused on safe-to-spend guidance.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  cryptography: ^2.9.0
  dio: ^5.9.2
  drift: 2.28.0
  drift_flutter: 0.2.4
  fl_chart: ^0.71.0
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  flutter_secure_storage: ^10.3.1
  freezed_annotation: 2.4.4
  go_router: ^14.2.0
  intl: ^0.19.0
  json_annotation: ^4.9.0
  local_auth: ^2.3.0
  path: ^1.9.0
  path_provider: ^2.1.5
  pdf: ^3.11.3
  printing: ^5.14.3
  share_plus: ^12.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: 2.4.15
  drift_dev: 2.28.0
  freezed: 2.5.8
  json_serializable: 6.9.5

flutter:
  uses-material-design: true
